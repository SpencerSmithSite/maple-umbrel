manifestVersion: 1.1
id: maple-umbrel-maple
name: Maple AI
tagline: Private AI chat powered by secure enclaves
icon: https://raw.githubusercontent.com/SpencerSmithSite/maple-umbrel/main/maple-umbrel-maple/icon.png
category: AI
version: "2.0.17-8"
port: 3001
description: >-
  Maple is a private AI chat app powered by end-to-end encryption and Trusted Execution Environments (TEEs) — your conversations are encrypted on your device and processed in secure hardware, invisible even to Maple. Includes an always-on OpenAI-compatible proxy at umbrel.local:3002 for use with Cursor, Open WebUI, and other AI tools.

  ⚠️ First-time setup: Maple's TEE security verification requires browser cryptographic APIs that only work over HTTPS. When accessing via http://umbrel.local, add http://umbrel.local:3001 to the secure origins list in your browser (Chrome: chrome://flags/#unsafely-treat-insecure-origin-as-secure, Firefox: about:config → dom.securecontext.allowlist). Not required if using Cloudflare Tunnel or Tor Browser. See the GitHub repo README for full instructions.
