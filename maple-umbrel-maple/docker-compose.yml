services:
  maple:
    image: ghcr.io/spencersmithsite/maple-umbrel:latest
    ports:
      - "3001:3000"
    depends_on:
      - maple-proxy
      - key-manager
    restart: unless-stopped
    networks:
      - default

  maple-proxy:
    build:
      context: ..
      dockerfile: Dockerfile.proxy
    environment:
      # Bind to all interfaces — default is 127.0.0.1 (loopback only),
      # which makes Docker port mapping a no-op.
      MAPLE_HOST: "0.0.0.0"
      MAPLE_PORT: "8080"
      MAPLE_BACKEND_URL: https://enclave.trymaple.ai
      # Enable CORS so browser-based clients (Open WebUI, etc.) can call the proxy directly.
      MAPLE_ENABLE_CORS: "true"
      RUST_LOG: info
      # Do NOT set MAPLE_API_KEY here — key-manager injects it via the shared volume.
    ports:
      - "3002:8080"
    restart: unless-stopped
    networks:
      - default
    volumes:
      - proxy-config:/config

  key-manager:
    build:
      context: ../key-manager
      dockerfile: Dockerfile
    environment:
      PROXY_HOST: "umbrel.local"
      PROXY_PORT: "3002"
    restart: unless-stopped
    networks:
      - default
    volumes:
      - proxy-config:/config

networks:
  default:
    driver: bridge

volumes:
  proxy-config:
